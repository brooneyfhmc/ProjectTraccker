<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Signing in…</title>
  <script src="msal-browser.min.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <p style="font-family:sans-serif;color:#1E3C4F;padding:20px;">Redirecting to sign-in…</p>
  <script>
    (async function () {
      // No Teams SDK needed here — this page just redirects to Microsoft login.
      // Teams SDK app.initialize() hangs in popup windows; skip it entirely.
      const msalInstance = new msal.PublicClientApplication({
        auth: {
          clientId:    CONFIG.clientId,
          authority:   `https://login.microsoftonline.com/${CONFIG.tenantId}`,
          redirectUri: window.location.origin + '/auth-end.html',
        },
        cache: { cacheLocation: 'localStorage' },
      });
      await msalInstance.initialize();

      // Redirect this popup window to Microsoft's login page.
      // Microsoft will redirect back to auth-end.html when done.
      await msalInstance.loginRedirect({ scopes: CONFIG.scopes });
    })();
  </script>
</body>
</html>
